# ============================================================
# Flux AI Dashboard — Frontend (Next.js)
# Repo: gitlab.com/fluxvane/apps/flux-ai
# Domain: https://dev-ai.fluxvane.com
#
# Pipeline flow (GitOps pull model):
#   1. build         → push 2 tags to registry.gitlab.com/fluxvane/apps/flux-ai
#                        - dev             (mutable, for debug)
#                        - dev-<short-sha> (immutable, what gets deployed)
#   2. gitops-update → write dev-<short-sha> into infra-gitops dev.yaml + commit
#                      → ArgoCD (automated+selfHeal) auto-syncs the new tag
#
# No more argocd-sync from CI — Git is the single source of truth.
#
# Required CI/CD variables:
#   (project) REGISTRY_URL, REGISTRY_USER, REGISTRY_PASSWORD — GitLab registry + job token
#   (project) GITOPS_TOKEN — write token for the infra-gitops repo (masked)
# ============================================================

include:
- project: 'shining-tree/devops/ci-templates'
  ref: develop
  file: '/pipelines/frontend-service.yml'

variables:
  # Service
  SERVICE_NAME: "flux-ai"
  FRONTEND_TYPE: "nextjs"

  # Docker — GitLab Container Registry
  # (REGISTRY_URL/USER/PASSWORD are supplied by project-level CI/CD variables)
  IMAGE_PATH: "fluxvane/apps/flux-ai"
  DOCKERFILE_PATH: "Dockerfile"
  BUILD_CONTEXT: "."

  # pnpm
  USE_PNPM: "true"
  PNPM_VERSION: "10.33.0"
  SKIP_VALIDATE: "true"
  SKIP_VALIDATION: "true"

  # Branch mapping — dev only for now
  DEV_BRANCH: "develop"
  UAT_BRANCH: ""
  PROD_BRANCH_PRIMARY: ""

  # Deploy via GitOps: commit the new image tag into infra-gitops,
  # then ArgoCD (automated + selfHeal) picks it up. No argocd-sync from CI.
  ARGO_ENABLED: "false"
  ENABLE_GITOPS: "true"
  GITOPS_REPO: "https://gitlab.com/fluxvane/devops/infra-gitops.git"
  GITOPS_BRANCH: "main"
  GITOPS_TENANT: "fluxvane"
  GITOPS_PROJECT: "flux-ai"
  # "<valuesKey>:<iacDir>" — flux-ai has a single web component.
  GITOPS_COMPONENTS: "web:web"

  # Deploy toggles — dev only
  ENABLE_DEV_DEPLOY: "true"
  ENABLE_UAT_DEPLOY: "false"
  ENABLE_BETA_DEPLOY: "false"
  ENABLE_PROD_DEPLOY: "false"

# No local job overrides — the included `frontend-service.yml` template
# defines build-dev and the gitops-update job. All deps are public on
# npmjs so no NPM_TOKEN build-arg is required.
