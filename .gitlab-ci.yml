# ============================================================
# Nera AI Dashboard — Frontend (Next.js)
# Repo: gitlab.com/fluxvane/ai-manager/frontend/ai-dashboard
# Domain: https://dev-ai.fluxvane.com
#
# Pipeline flow:
#   1. build  → Docker image → registry.shiningtree.co/fluxvane/ai-dashboard
#   2. deploy → ArgoCD sync  → ai-dashboard-web-dev
#
# Required CI/CD variables (group/project level, masked):
#   REGISTRY_USER, REGISTRY_PASSWORD  — registry.shiningtree.co credentials
#   ARGO_AUTH_TOKEN                   — ArgoCD admin token
#   NPM_TOKEN                         — npm registry token (for nera-common)
# ============================================================

include:
- project: 'shining-tree/devops/ci-templates'
  ref: develop
  file: '/pipelines/frontend-service.yml'

variables:
  # Service
  SERVICE_NAME: "ai-dashboard"
  FRONTEND_TYPE: "nextjs"

  # Docker
  REGISTRY_URL: "registry.shiningtree.co"
  IMAGE_PATH: "fluxvane/ai-dashboard"
  DOCKERFILE_PATH: "Dockerfile"
  BUILD_CONTEXT: "."

  # pnpm
  USE_PNPM: "true"
  PNPM_VERSION: "10.33.0"
  SKIP_VALIDATE: "true"
  SKIP_VALIDATION: "true"

  # Branch mapping — dev only for now
  DEV_BRANCH: "develop"
  UAT_BRANCH: ""
  PROD_BRANCH_PRIMARY: ""

  # ArgoCD
  ARGO_ENABLED: "true"
  ARGO_SERVER: "argocd.shiningtree.co"
  ARGO_APP_PREFIX: "ai-dashboard"
  ARGO_SERVICE_NAME: "web"
  ARGOCD_APP_DEV: "ai-dashboard-web-dev"
  ARGO_INSECURE: "true"
  ARGO_SYNC_TIMEOUT: "300"
  ARGO_SYNC_PRUNE: "true"
  ARGO_ROLLOUT_RESTART: "true"

  # Deploy toggles — dev only
  ENABLE_DEV_DEPLOY: "true"
  ENABLE_UAT_DEPLOY: "false"
  ENABLE_BETA_DEPLOY: "false"
  ENABLE_PROD_DEPLOY: "false"

# -----------------------------------------------------------------------
# Pass NPM_TOKEN to Docker build so it can install nera-common
# from the npm registry during the image build stage.
# -----------------------------------------------------------------------

build-dev:
  variables:
    BUILD_ARGS: "--build-arg NPM_TOKEN=${NPM_TOKEN}"
