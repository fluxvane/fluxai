# ============================================================
# Flux-AI — Frontend (Next.js)
# Repo:   gitlab.com/fluxvane/apps/flux-ai
# Domain: https://dev-ai.fluxvane.com
#
# Pipeline flow:
#   1. build  → Docker image → registry.gitlab.com/fluxvane/apps/flux-ai
#   2. deploy → ArgoCD sync  → flux-ai-web-dev
#
# Registry: GitLab Container Registry (was registry.shiningtree.co — CF 100MB 413).
# The fluxvane group sets REGISTRY_URL/USER/PASSWORD to shiningtree creds; those are
# overridden by PROJECT-level CI/CD variables on this project pointing at the GitLab
# registry + job token ($CI_REGISTRY / $CI_REGISTRY_USER / $CI_REGISTRY_PASSWORD).
#
# Required CI/CD variables:
#   (project) REGISTRY_URL, REGISTRY_USER, REGISTRY_PASSWORD — GitLab registry + job token
#   (group)   ARGO_AUTH_TOKEN — ArgoCD admin token
#   (group)   NPM_TOKEN       — npm registry token (for nera-common)
# ============================================================

include:
- project: 'shining-tree/devops/ci-templates'
  ref: develop
  file: '/pipelines/frontend-service.yml'

variables:
  # Service
  SERVICE_NAME: "flux-ai"
  FRONTEND_TYPE: "nextjs"

  # Docker — GitLab Container Registry (REGISTRY_URL/USER/PASSWORD via project vars)
  IMAGE_PATH: "fluxvane/apps/flux-ai"
  DOCKERFILE_PATH: "Dockerfile"
  BUILD_CONTEXT: "."

  # pnpm
  USE_PNPM: "true"
  PNPM_VERSION: "10.33.0"
  SKIP_VALIDATE: "true"
  SKIP_VALIDATION: "true"

  # Branch mapping — dev only for now
  DEV_BRANCH: "develop"
  UAT_BRANCH: ""
  PROD_BRANCH_PRIMARY: ""

  # ArgoCD
  ARGO_ENABLED: "true"
  ARGO_SERVER: "argocd.shiningtree.co"
  ARGO_APP_PREFIX: "flux-ai"
  ARGO_SERVICE_NAME: "web"
  ARGOCD_APP_DEV: "flux-ai-web-dev"
  ARGO_INSECURE: "true"
  ARGO_SYNC_TIMEOUT: "300"
  ARGO_SYNC_PRUNE: "true"
  ARGO_ROLLOUT_RESTART: "true"

  # Deploy toggles — dev only
  ENABLE_DEV_DEPLOY: "true"
  ENABLE_UAT_DEPLOY: "false"
  ENABLE_BETA_DEPLOY: "false"
  ENABLE_PROD_DEPLOY: "false"

# -----------------------------------------------------------------------
# Pass NPM_TOKEN to Docker build so it can install nera-common
# from the npm registry during the image build stage.
# -----------------------------------------------------------------------

build-dev:
  variables:
    BUILD_ARGS: "--build-arg NPM_TOKEN=${NPM_TOKEN}"
