name: docker-publish

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive env + tag
        id: meta
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            env="prod"
          else
            env="dev"
          fi
          short_sha="${GITHUB_SHA:0:7}"
          image="ghcr.io/fluxvane/fluxai"
          tag="${env}-${short_sha}"
          # Persist as step outputs for subsequent steps.
          echo "env=${env}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "::group::Computed metadata"
          echo "image=${image}:${tag}"
          echo "::endgroup::"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          labels: |
            org.opencontainers.image.title=flux-ai
            org.opencontainers.image.description=Fluxvane FluxAI dashboard
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make package public
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Tolerate 404 (package not yet created on first push) and 422
          # (already public, or other constraint). The lib's paid-plan
          # grep doesn't match these — inline toleration here.
          set +e
          HTTP=$(gh api \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            /orgs/fluxvane/packages/container/fluxai \
            -f visibility=public \
            --include -o /dev/null -w "%{http_code}")
          gh_status=$?
          set -e
          # If gh itself failed (auth, network), the captured HTTP may be empty.
          if [[ $gh_status -ne 0 && -z "$HTTP" ]]; then
            echo "[fail] gh api exited $gh_status"
            exit 1
          fi
          case "$HTTP" in
            2*) echo "[ok] package set to public" ;;
            404) echo "[skip] package does not exist yet (will retry next push)" ;;
            422) echo "[skip] package visibility already public or other 422" ;;
            *) echo "[fail] unexpected HTTP $HTTP"; exit 1 ;;
          esac

  gitops-update:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GITOPS_REPO: gitlab.com/fluxvane/devops/infra-gitops.git
      GITOPS_ENV_FILE_DEV: tenants/fluxvane/projects/flux-ai/iac/web/environments/dev.yaml
      GITOPS_ENV_FILE_PROD: tenants/fluxvane/projects/flux-ai/iac/web/environments/prod.yaml
    steps:
      - name: Derive env + tag
        id: meta
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            env="prod"
          else
            env="dev"
          fi
          short_sha="${GITHUB_SHA:0:7}"
          echo "env=${env}" >> "$GITHUB_OUTPUT"
          echo "tag=${env}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up deploy key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.GITOPS_SSH_KEY }}" > ~/.ssh/gitops_deploy_key
          chmod 600 ~/.ssh/gitops_deploy_key
          ssh-keyscan -t ed25519 gitlab.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Clone infra-gitops
        run: |
          GIT_SSH_COMMAND="ssh -i ~/.ssh/gitops_deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts" \
            git clone --depth 1 "git@${GITOPS_REPO}" infra-gitops

      - name: Bump image tag
        id: bump
        working-directory: infra-gitops
        run: |
          env="${{ steps.meta.outputs.env }}"
          tag="${{ steps.meta.outputs.tag }}"
          if [[ "$env" == "prod" ]]; then
            file="$GITOPS_ENV_FILE_PROD"
          else
            file="$GITOPS_ENV_FILE_DEV"
          fi
          sed -i -E "s/^(\s*tag:\s*).*/\1${tag}/" "$file"
          git diff --stat
          echo "file=${file}" >> "$GITHUB_OUTPUT"

      - name: Commit + push
        working-directory: infra-gitops
        run: |
          git config user.name "flux-ai-ci"
          git config user.email "ci@fluxvane.noreply"
          git add "${{ steps.bump.outputs.file }}"
          git commit -m "ci(fluxvane/flux-ai): ${{ steps.meta.outputs.env }} -> ${{ steps.meta.outputs.tag }} [skip ci]"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/gitops_deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts" \
            git push origin HEAD:main

      - name: Clean up deploy key
        if: always()
        run: rm -f ~/.ssh/gitops_deploy_key
